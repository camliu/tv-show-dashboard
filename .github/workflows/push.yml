name: Push

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/_lint.yml

  typecheck:
    uses: ./.github/workflows/_typecheck.yml

  test:
    uses: ./.github/workflows/_test.yml
